<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幼兒識字閃卡 - Miss Q</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chinese-fonts/jf-openhuninn@1.0.1/dist/jf-openhuninn/result.css">
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "jf-openhuninn", "M PLUS Rounded 1c", sans-serif;
            font-weight: bold;
            color: #4A4A4A;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #EBF5FB; 
            background-image: radial-gradient(#AED6F1 20%, transparent 20%),
                              radial-gradient(#AED6F1 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            user-select: none;
            overflow: hidden;
        }

        #muteBtn {
            position: fixed;
            top: 25px;
            right: 20px;
            font-size: 26px;
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #A3E4D7;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 9999; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            padding: 0;
        }

        #muteBtn:active {
            transform: scale(0.9);
        }

        #start-screen, #game-container, #end-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #game-container, #end-screen {
            display: none;
        }

        .card-container {
            width: 85vw;
            min-height: 55vh; /* 🌟 修正：改用彈性高度，字太多會自動拉長，不再跌出框外 */
            height: auto;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            border: 12px solid #D6EAF8; 
            border-radius: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px; 
            padding: 30px 20px; /* 增加上下 Padding，讓版面更鬆動 */
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        .word {
            font-size: min(40vw, 220px); 
            line-height: 1;
            margin: 0;
            font-family: "BiauKai", "Kaiti TC", "DFKai-SB", "標楷體", STKaiti, "LXGW WenKai TC", serif !important;
            font-weight: normal !important; 
        }

        .btn {
            font-family: "jf-openhuninn", sans-serif !important;
            font-size: 28px;
            padding: 15px 50px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            background-color: #E8F8F5; 
            border: 4px solid #A3E4D7;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px; 
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-action {
            font-size: 22px;
            background-color: #FEF9E7; 
            border: 4px solid #F9E79F;
            margin-top: 15px;
            margin-bottom: 5px; 
            padding: 12px 35px;
        }

        .trophy {
            font-size: 60px;
            margin-bottom: 10px;
            font-weight: normal;
        }
        
        .end-text {
            font-size: 24px;
            margin: 5px 0;
        }

        .start-text {
            font-size: 20px;
            color: #E67E22;
            margin: 15px 0;
            line-height: 1.6;
            padding: 0 10px;
        }

        input[type="text"] {
            font-family: "jf-openhuninn", sans-serif !important;
            font-size: 20px;
            padding: 10px;
            border: 3px solid #AED6F1;
            border-radius: 15px;
            outline: none;
            text-align: center;
            width: 75%;
            margin: 15px 0;
            box-sizing: border-box;
        }

        .praise-message {
            font-size: 18px; 
            color: #E67E22;
            margin-top: 10px;
            line-height: 1.6;
            padding: 0 5px;
            display: none; 
            word-break: break-all;
            width: 100%;
            box-sizing: border-box;
        }

        .footer {
            font-family: "jf-openhuninn", sans-serif !important;
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 18px; 
            letter-spacing: 1px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.mfiles.co.uk/mp3-downloads/twinkle-twinkle-little-star.mp3" type="audio/mpeg">
    </audio>

    <button id="muteBtn" onclick="toggleMusic()">🔊</button>

    <div id="start-screen">
        <div class="card-container">
            <div class="trophy">🎈</div>
            <div class="end-text" style="font-size: 26px; font-weight: bold;">識字大挑戰</div>
            <div class="start-text">
                這裡有 <strong>88</strong> 個幼稚園 K3<br>常見中文字！<br><br>你準備好接受挑戰了嗎？
            </div>
            <button class="btn btn-action" onclick="startGame()">接受挑戰 🚀</button>
        </div>
    </div>

    <div id="game-container">
        <div class="card-container">
            <div class="word" id="wordDisplay"></div>
        </div>
        <button class="btn" onclick="handleAnswer()">正確 🌟</button>
    </div>

    <div id="end-screen">
        <div class="card-container">
            <div class="trophy">🏆</div>
            <div class="end-text">完成挑戰了！</div>
            <div class="end-text">你答對了 <span id="scoreDisplay" style="color: #27AE60;">0</span> 個字！</div>
            
            <input type="text" id="playerName" placeholder="輸入你的名字">
            <button class="btn btn-action" id="submitBtn" onclick="showPraise()">領取獎盃
