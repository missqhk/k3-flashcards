<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幼兒識字閃卡 - Miss Q</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Huninn&family=M+PLUS+Rounded+1c:wght@800&display=swap" rel="stylesheet">

    <style>
        /* 全域使用可愛圓圓粗字體，統一深灰色 */
        * {
            font-family: "M PLUS Rounded 1c", "Huninn", "Arial Rounded MT Bold", sans-serif;
            font-weight: 800; /* 設定為極粗體，讓字看起來圓滾滾 */
            color: #4A4A4A;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #EBF5FB; 
            background-image: radial-gradient(#AED6F1 20%, transparent 20%),
                              radial-gradient(#AED6F1 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            user-select: none;
            overflow: hidden;
        }

        #game-container, #end-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #end-screen {
            display: none;
        }

        .card-container {
            width: 85vw;
            height: 60vh;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            border: 12px solid #D6EAF8; 
            border-radius: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        /* 閃卡中的中文字保留原有大字體，強制使用標楷體 */
        .word {
            font-size: min(40vw, 250px); 
            line-height: 1;
            margin: 0;
            font-family: "BiauKai", "DFKai-SB", "標楷體", STKaiti, serif;
            font-weight: normal; /* 標楷體不需要加粗，保持筆劃清晰 */
        }

        .btn {
            font-size: 28px;
            padding: 15px 50px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            background-color: #E8F8F5; 
            border: 4px solid #A3E4D7;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-submit {
            font-size: 20px;
            background-color: #FEF9E7; 
            border: 4px solid #F9E79F;
            margin-top: 10px;
            padding: 10px 30px;
        }

        .trophy {
            font-size: 60px;
            margin-bottom: 5px;
            font-weight: normal;
        }
        
        .end-text {
            font-size: 22px;
            margin: 5px 0;
        }

        input[type="text"] {
            font-size: 20px;
            padding: 10px;
            border: 3px solid #AED6F1;
            border-radius: 15px;
            outline: none;
            text-align: center;
            width: 70%;
            margin: 10px 0;
            /* 讓輸入框內的字也變粗圓體 */
            font-family: "M PLUS Rounded 1c", "Huninn", sans-serif;
            font-weight: 800;
        }

        /* 讚美文字大小再微調為 17px，確保極粗字體也能完美 fit 入白框 */
        .praise-message {
            font-size: 17px; 
            color: #E67E22;
            margin-top: 10px;
            line-height: 1.5;
            padding: 0 10px;
            display: none; 
            word-wrap: break-word;
        }

        .footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 18px; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="card-container">
            <div class="word" id="wordDisplay"></div>
        </div>
        <button class="btn" onclick="handleAnswer()">正確 🌟</button>
    </div>

    <div id="end-screen">
        <div class="card-container">
            <div class="trophy">🏆</div>
            <div class="end-text">完成挑戰了！</div>
            <div class="end-text">你答對了 <span id="scoreDisplay" style="color: #27AE60;">0</span> 個字！</div>
            
            <input type="text" id="playerName" placeholder="輸入你的名字">
            <button class="btn btn-submit" id="submitBtn" onclick="showPraise()">領取獎盃 🎁</button>
            
            <div class="praise-message" id="praiseMessage"></div>
        </div>
    </div>

    <div class="footer">遊戲設計： Miss Q</div>

    <script>
        const words = ["人", "口", "手", "足", "目", "耳", "頭", "心", "父", "母", "爸", "媽", "哥", "姐", "弟", "妹", "男", "女", "子", "老", "師", "生", "友", "山", "水", "石", "田", "土", "火", "風", "雨", "雪", "電", "天", "地", "花", "草", "木", "魚", "鳥", "馬", "牛", "羊", "狗", "貓", "蟲", "紅", "黃", "藍", "綠", "黑", "白", "上", "下", "左", "右", "前", "後", "中", "內", "外", "大", "小", "長", "短", "坐", "立", "走", "跑", "看", "聽", "說", "讀", "寫", "吃", "喝", "玩", "去", "來", "出", "入", "開", "關", "家", "車", "書", "筆", "衣"];

        let currentIndex = 0;
        let score = 0;

        const wordDisplay = document.getElementById('wordDisplay');
        const gameContainer = document.getElementById('game-container');
        const endScreen = document.getElementById('end-screen');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const playerNameInput = document.getElementById('playerName');
        const praiseMessage = document.getElementById('praiseMessage');
        const submitBtn = document.getElementById('submitBtn');

        function updateCard() {
            wordDisplay.textContent = words[currentIndex];
        }

        function handleAnswer() {
            score++;
            currentIndex++;
            if (currentIndex < words.length) {
                updateCard();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            gameContainer.style.display = 'none';
            endScreen.style.display = 'flex';
            scoreDisplay.textContent = score;
        }

        function showPraise() {
            const name = playerNameInput.value.trim();
            if (name === "") {
                alert("請先輸入名字喔！");
                return;
            }
            
            praiseMessage.innerHTML = "<strong>" + name + "</strong> 小朋友，你太棒了！<br>這座獎盃是你努力的證明。<br>學習真是一件快樂的事!<br>請保持積極的心，未來更閃耀！✨🌈";
            praiseMessage.style.display = 'block';
            
            // 隱藏輸入框和提交鈕以節省空間
            playerNameInput.style.display = 'none';
            submitBtn.style.display = 'none';
        }

        updateCard();
    </script>

</body>
</html>
