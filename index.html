<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幼兒識字閃卡 - Miss Q</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chinese-fonts/jf-openhuninn@1.0.1/dist/jf-openhuninn/result.css">
    <style>
        * { font-family: "jf-openhuninn", sans-serif; font-weight: bold; color: #4A4A4A; box-sizing: border-box; }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #EBF5FB; background-image: radial-gradient(#AED6F1 20%, transparent 20%), radial-gradient(#AED6F1 20%, transparent 20%); background-size: 40px 40px; }
        #start-screen, #game-container, #end-screen { display: flex; flex-direction: column; align-items: center; width: 100%; position: absolute; }
        #game-container, #end-screen { display: none; }
        .card-container { width: 85vw; min-height: 50vh; background: rgba(255, 255, 255, 0.95); border: 12px solid #D6EAF8; border-radius: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .word { font-size: min(30vw, 150px); font-family: "BiauKai", "標楷體", serif; }
        .btn { font-size: 24px; padding: 15px 40px; border-radius: 50px; border: 4px solid #A3E4D7; background: #E8F8F5; cursor: pointer; margin-top: 20px; }
        .footer { position: fixed; bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="card-container">
            <div style="font-size: 40px;">🎈</div>
            <h3>識字大挑戰</h3>
            <p>共有 88 個 K3 中文字，準備好了嗎？</p>
            <button class="btn" onclick="goGame()">接受挑戰 🚀</button>
        </div>
    </div>

    <div id="game-container">
        <div class="card-container">
            <div class="word" id="wordDisplay">人</div>
        </div>
        <button class="btn" onclick="nextWord()">正確 🌟</button>
    </div>

    <div class="footer">遊戲設計： Miss Q</div>

    <script>
        var words = ["人", "口", "手", "足", "目", "耳", "頭", "心", "父", "母", "爸", "媽", "哥", "姐", "弟", "妹", "男", "女", "子", "老", "師", "生", "友", "山", "水", "石", "田", "土", "火", "風", "雨", "雪", "電", "天", "地", "花", "草", "木", "魚", "鳥", "馬", "牛", "羊", "狗", "貓", "蟲", "紅", "黃", "藍", "綠", "黑", "白", "上", "下", "左", "右", "前", "後", "中", "內", "外", "大", "小", "長", "短", "坐", "立", "走", "跑", "看", "聽", "說", "讀", "寫", "吃", "喝", "玩", "去", "來", "出", "入", "開", "關", "家", "車", "書", "筆", "衣"];
        var idx = 0;

        function goGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
        }

        function nextWord() {
            idx++;
            if (idx < words.length) {
                document.getElementById('wordDisplay').innerText = words[idx];
            } else {
                alert("挑戰完成！");
                location.reload();
            }
        }
    </script>
</body>
</html>
