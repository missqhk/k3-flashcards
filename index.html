<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幼兒識字閃卡</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+HK:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* 內建可愛柔和波點背景 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FFF0F5; 
            background-image: radial-gradient(#FFB6C1 20%, transparent 20%),
                              radial-gradient(#FFB6C1 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            
            /* 2. 終極字型清單：強制 Android 先讀取 Google 的標準字型，Apple 裝置就用內置標楷體 */
            font-family: "Noto Serif HK", "BiauKai", "DFKai-SB", "標楷體", STKaiti, serif;
            
            user-select: none;
            overflow: hidden;
            cursor: pointer;
        }

        /* 閃卡容器 */
        .card-container {
            width: 90vw;
            height: 80vh;
            max-width: 800px;
            max-height: 600px;
            background: rgba(255, 255, 255, 0.95);
            border: 12px solid #FFDEE9; 
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }

        .card-container:active {
            transform: scale(0.98); 
        }

        /* 中文字體樣式 */
        .word {
            font-size: min(45vw, 320px); 
            color: #4A4A4A;
            text-align: center;
            line-height: 1;
            font-weight: 500; /* 使用適中粗細，確保筆劃分明 */
        }
    </style>
</head>
<body>

    <div class="card-container" id="flashCard">
        <div class="word" id="wordDisplay"></div>
    </div>

    <script>
        // ==========================================
        // ✨ 在這裡隨時修改你想給 K3 學生認讀的中文字 ✨
        // ==========================================
        const words = ["山", "水", "日", "月", "火", "木", "天", "地", "人", "手", "口", "心"];

        let currentIndex = 0;
        const wordDisplay = document.getElementById('wordDisplay');
        const flashCard = document.getElementById('flashCard');

        function updateCard() {
            wordDisplay.textContent = words[currentIndex];
        }

        document.body.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        });

        updateCard();
    </script>

</body>
</html>
